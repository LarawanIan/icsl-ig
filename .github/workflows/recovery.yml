name: Cloud Certificate Extraction Tool

on:
  workflow_dispatch:

jobs:
  extract-and-pack:
    name: Extract Signature and Build Keystore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Process Signature Blocks via OpenSSL
        run: |
          mkdir -p /tmp/recovery
          
          # Copy the file from your staged repository path
          cp cert-recovery/MORPHE.RSA /tmp/recovery/MORPHE.RSA
          
          echo "🌐 Stripping PKCS7 wrapper bytes using native Linux OpenSSL..."
          openssl pkcs7 -inform DER -in /tmp/recovery/MORPHE.RSA -print_certs -out /tmp/recovery/clean-morphe.crt
          
          echo "🔑 Compiling a healthy PKCS12 keystore around the signature..."
          keytool -importcert -file /tmp/recovery/clean-morphe.crt -keystore /tmp/recovery/production.keystore -alias "morphe-key" -storepass "s3cur3p@ssw0rd" -noprompt
          
          echo ""
          echo "==================== START RECOVERY PAYLOAD ===================="
          base64 -w 0 /tmp/recovery/production.keystore
          echo ""
          echo "===================== END RECOVERY PAYLOAD ====================="
          echo ""
          
          rm -rf /tmp/recovery