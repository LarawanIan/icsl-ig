name: Cryptographic Lineage Recovery Tool

on:
  workflow_dispatch:

jobs:
  forge-lineage:
    name: Build Linked Keystore Profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Lineage Node Environment
        run: |
          mkdir -p /tmp/workspace
          
          if [ ! -f "cert-recovery/MORPHE.RSA" ]; then
            echo "❌ Target file cert-recovery/MORPHE.RSA is missing."
            exit 1
          fi

          echo "🌐 Converting PKCS7 structure to standard X509 stream format..."
          openssl pkcs7 -inform DER -in cert-recovery/MORPHE.RSA -print_certs -out /tmp/workspace/original_public.crt

          echo "🔑 Provisioning a new master keypair..."
          keytool -genkeypair -v \
            -keystore /tmp/workspace/rotating_master.keystore \
            -alias "morphe-key" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "s3cur3p@ssw0rd" \
            -keypass "s3cur3p@ssw0rd" \
            -dname "CN=Ian, O=Morphe, C=PH" \
            -storetype PKCS12

          echo "🔗 Injecting legacy signature context into container infrastructure..."
          keytool -importcert -noprompt \
            -file /tmp/workspace/original_public.crt \
            -keystore /tmp/workspace/rotating_master.keystore \
            -alias "old-key-link" \
            -storepass "s3cur3p@ssw0rd"

          echo ""
          echo "==================== START RECOVERY PAYLOAD ===================="
          base64 -w 0 /tmp/workspace/rotating_master.keystore
          echo ""
          echo "===================== END RECOVERY PAYLOAD ====================="
          echo ""

          rm -rf /tmp/workspace